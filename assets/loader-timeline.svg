<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 50" width="850" height="50">
  <defs>
    <style>
      @keyframes borderGlow {
        0%, 100% { stroke: #00f0ff; filter: drop-shadow(0 0 2px #00f0ff); }
        50% { stroke: #00ff66; filter: drop-shadow(0 0 5px #00ff66); }
      }
      @keyframes nodeFade {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
      .box {
        fill: #050814;
        stroke-width: 1.5;
        animation: borderGlow 4s infinite ease-in-out;
      }
      .node-anim {
        fill: #00ff66;
        filter: drop-shadow(0 0 2px #00ff66);
        animation: nodeFade 1.2s infinite ease-in-out;
      }
      .node-1 { animation-delay: 0s; }
      .node-2 { animation-delay: 0.2s; }
      .node-3 { animation-delay: 0.4s; }
      .node-4 { animation-delay: 0.6s; }
      .node-5 { animation-delay: 0.8s; }
      .text-style {
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect width="840" height="46" x="5" y="2" rx="6" class="box" />
  <text x="20" y="29" fill="#00ff66" class="text-style" font-weight="bold">
    vishal@ai-core:~$ <tspan fill="#ffffff">cat timeline.log --follow</tspan>
  </text>
  <text x="350" y="29" fill="#a9b1d6" class="text-style">
    UPDATING TIME BLOCKS...
  </text>
  <g transform="translate(680, 18)">
    <rect width="12" height="12" rx="3" class="node-anim node-1" />
    <rect x="18" width="12" height="12" rx="3" class="node-anim node-2" />
    <rect x="36" width="12" height="12" rx="3" class="node-anim node-3" />
    <rect x="54" width="12" height="12" rx="3" class="node-anim node-4" />
    <rect x="72" width="12" height="12" rx="3" class="node-anim node-5" />
  </g>
</svg>
