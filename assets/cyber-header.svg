<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="850" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=VT323&amp;display=swap');
      
      @keyframes bgPulse {
        0%, 100% { fill: #040815; }
        50% { fill: #0d0c22; }
      }
      @keyframes borderGlow {
        0%, 100% { stroke: #00ff66; filter: drop-shadow(0 0 4px #00ff66); }
        50% { stroke: #00f0ff; filter: drop-shadow(0 0 8px #00f0ff); }
      }
      
      .terminal-rect {
        animation: bgPulse 10s infinite ease-in-out, borderGlow 6s infinite ease-in-out;
      }
      
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      
      .text-title {
        font-family: 'Fira Code', monospace;
        font-size: 13px;
        fill: #7f8c8d;
      }
      
      .terminal-text {
        font-family: 'VT323', monospace;
        font-size: 20px;
        fill: #a9b1d6;
      }
      
      .prompt-user { fill: #00f0ff; font-weight: bold; }
      .prompt-host { fill: #a9b1d6; }
      .prompt-dir { fill: #00ff66; }
      .cmd { fill: #ffffff; }
      .status-ok { fill: #00ff66; font-weight: bold; }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        fill: #00ff66;
        animation: blink 1s infinite;
      }
      
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .line-1 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 0.5s; }
      .line-2 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 2.0s; }
      .line-3 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 3.5s; }
      .line-4 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 5.0s; }
      .line-5 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 6.5s; }
      
      @keyframes matrixRain {
        0% { transform: translateY(-150px); }
        100% { transform: translateY(350px); }
      }
      
      .matrix-col {
        font-family: 'VT323', monospace;
        font-size: 14px;
        fill: #00ff66;
        opacity: 0.15;
      }
      .col-1 { animation: matrixRain 7s linear infinite; }
      .col-2 { animation: matrixRain 10s linear infinite; }
      .col-3 { animation: matrixRain 13s linear infinite; }
      
      @keyframes pulseNode {
        0%, 100% { r: 4px; fill: #00f0ff; opacity: 0.6; filter: drop-shadow(0 0 2px #00f0ff); }
        50% { r: 7px; fill: #00ff66; opacity: 1; filter: drop-shadow(0 0 6px #00ff66); }
      }
      .node { animation: pulseNode 3s infinite ease-in-out; }
      .node-d1 { animation-delay: 0.5s; }
      .node-d2 { animation-delay: 1.0s; }
      .node-d3 { animation-delay: 1.5s; }
      .node-d4 { animation-delay: 2.0s; }
      
      @keyframes radarSweep {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .radar-sweep-line {
        transform-origin: 680px 180px;
        animation: radarSweep 8s linear infinite;
      }
      
      @keyframes linePulse {
        0%, 100% { stroke-dashoffset: 20; stroke: #00f0ff; }
        50% { stroke-dashoffset: 0; stroke: #00ff66; }
      }
      .net-line {
        stroke-dasharray: 5, 5;
        animation: linePulse 4s linear infinite;
      }
    </style>
  </defs>
  
  <!-- Outer Terminal -->
  <rect x="5" y="5" width="840" height="340" rx="10" class="terminal-rect" fill="#040815" stroke-width="1.5" />
  
  <!-- Header Bar -->
  <path d="M 5 15 A 10 10 0 0 1 15 5 L 835 5 A 10 10 0 0 1 845 15 L 845 40 L 5 40 Z" fill="#0d1527" />
  <circle cx="25" cy="22" r="6" class="dot-red" />
  <circle cx="45" cy="22" r="6" class="dot-yellow" />
  <circle cx="65" cy="22" r="6" class="dot-green" />
  <text x="425" y="27" text-anchor="middle" class="text-title">vishal@ai-core:~</text>

  <!-- Matrix Background columns -->
  <g class="matrix-col">
    <!-- Column 1 -->
    <g class="col-1" transform="translate(120, 0)">
      <text x="0" y="20">1</text><text x="0" y="40">0</text><text x="0" y="60">1</text><text x="0" y="80">0</text><text x="0" y="100">1</text><text x="0" y="120">A</text><text x="0" y="140">I</text>
    </g>
    <!-- Column 2 -->
    <g class="col-2" transform="translate(260, 0)">
      <text x="0" y="20">0</text><text x="0" y="40">1</text><text x="0" y="60">J</text><text x="0" y="80">A</text><text x="0" y="100">V</text><text x="0" y="120">A</text>
    </g>
    <!-- Column 3 -->
    <g class="col-3" transform="translate(390, 0)">
      <text x="0" y="20">P</text><text x="0" y="40">Y</text><text x="0" y="60">T</text><text x="0" y="80">H</text><text x="0" y="100">O</text><text x="0" y="120">N</text>
    </g>
  </g>

  <!-- Left Console Area -->
  <!-- Line 1 -->
  <g class="line-1">
    <text x="25" y="85" class="terminal-text">
      <tspan class="prompt-user">vishal</tspan><tspan class="prompt-host">@ai-core</tspan><tspan class="prompt-dir">:~$</tspan>
      <tspan class="cmd"> ./init_profile.sh</tspan>
    </text>
  </g>
  
  <!-- Line 2 -->
  <g class="line-2">
    <text x="25" y="125" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>Loading Neural Networks... Done (120ms)
    </text>
  </g>
  
  <!-- Line 3 -->
  <g class="line-3">
    <text x="25" y="165" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>Activating Tech Stack: Java | Python | Flutter | GenAI
    </text>
  </g>

  <!-- Line 4 -->
  <g class="line-4">
    <text x="25" y="205" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>Targeting: AI-Powered Software Engineering
    </text>
  </g>

  <!-- Line 5 -->
  <g class="line-5">
    <text x="25" y="245" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>Mission: "Build the future using algorithms &amp; intelligence"
    </text>
    <rect x="25" y="270" width="10" height="18" class="cursor" />
    <text x="40" y="285" class="terminal-text" fill="#00ff66">Console active. Ready to deploy.</text>
  </g>

  <!-- Right Side: Radar / Net Area -->
  <circle cx="680" cy="180" r="100" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
  <circle cx="680" cy="180" r="70" fill="none" stroke="#00ff66" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />
  <circle cx="680" cy="180" r="40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.2" />
  <circle cx="680" cy="180" r="10" fill="none" stroke="#00ff66" stroke-width="1" />
  
  <!-- Radar Crosshairs -->
  <line x1="570" y1="180" x2="790" y2="180" stroke="#00f0ff" stroke-width="0.5" opacity="0.2" />
  <line x1="680" y1="70" x2="680" y2="290" stroke="#00f0ff" stroke-width="0.5" opacity="0.2" />
  
  <!-- Radar Sweep Line -->
  <line x1="680" y1="180" x2="770" y2="130" stroke="#00ff66" stroke-width="1.5" class="radar-sweep-line" opacity="0.6" />
  
  <!-- Net connections -->
  <g stroke="#00f0ff" stroke-width="1" class="net-line">
    <line x1="630" y1="130" x2="680" y2="100" />
    <line x1="680" y1="100" x2="730" y2="120" />
    <line x1="730" y1="120" x2="740" y2="200" />
    <line x1="740" y1="200" x2="690" y2="240" />
    <line x1="690" y1="240" x2="620" y2="210" />
    <line x1="620" y1="210" x2="630" y2="130" />
  </g>
  
  <!-- Nodes -->
  <circle cx="630" cy="130" r="5" class="node node-d1" />
  <circle cx="680" cy="100" r="5" class="node node-d2" />
  <circle cx="730" cy="120" r="5" class="node node-d3" />
  <circle cx="740" cy="200" r="5" class="node node-d4" />
  <circle cx="690" cy="240" r="5" class="node node-d1" />
  <circle cx="620" cy="210" r="5" class="node node-d2" />
  <circle cx="680" cy="180" r="6" fill="#00ff66" />
</svg>
