<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="850" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=VT323&amp;display=swap');
      
      @keyframes bgPulse {
        0%, 100% { fill: #03050c; }
        50% { fill: #070918; }
      }
      @keyframes borderGlow {
        0%, 100% { stroke: #00ff66; filter: drop-shadow(0 0 5px #00ff66); }
        50% { stroke: #00f0ff; filter: drop-shadow(0 0 10px #00f0ff); }
      }
      
      .terminal-rect {
        animation: bgPulse 12s infinite ease-in-out, borderGlow 6s infinite ease-in-out;
      }
      
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      
      .text-title {
        font-family: 'Fira Code', monospace;
        font-size: 13px;
        fill: #7f8c8d;
      }
      
      .terminal-text {
        font-family: 'VT323', monospace;
        font-size: 21px;
        fill: #a9b1d6;
      }
      
      .prompt-user { fill: #00f0ff; font-weight: bold; }
      .prompt-host { fill: #a9b1d6; }
      .prompt-dir { fill: #00ff66; }
      .cmd { fill: #ffffff; }
      .status-ok { fill: #00ff66; font-weight: bold; }
      .status-alert { fill: #ffbd2e; font-weight: bold; }
      .status-error { fill: #ff5f56; font-weight: bold; }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        fill: #00ff66;
        animation: blink 1s infinite;
      }
      
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .line-1 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 0.5s; }
      .line-2 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 2.0s; }
      .line-3 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 3.5s; }
      .line-4 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 5.2s; }
      .line-5 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 6.8s; }
      .line-6 { opacity: 0; animation: fade-in 0.3s forwards; animation-delay: 8.5s; }
      
      @keyframes matrixRain {
        0% { transform: translateY(-280px); }
        100% { transform: translateY(420px); }
      }
      
      .matrix-col {
        font-family: 'VT323', monospace;
        font-size: 15px;
        fill: #00ff66;
        filter: drop-shadow(0 0 2px #00ff66);
      }
      
      .m-speed-1 { animation: matrixRain 7s linear infinite; }
      .m-speed-2 { animation: matrixRain 10s linear infinite; }
      .m-speed-3 { animation: matrixRain 13s linear infinite; }
      .m-speed-4 { animation: matrixRain 16s linear infinite; }
      
      @keyframes pulseNode {
        0%, 100% { r: 5px; fill: #00f0ff; opacity: 0.6; filter: drop-shadow(0 0 3px #00f0ff); }
        50% { r: 8px; fill: #00ff66; opacity: 1; filter: drop-shadow(0 0 8px #00ff66); }
      }
      .node { animation: pulseNode 3s infinite ease-in-out; }
      .node-d1 { animation-delay: 0.5s; }
      .node-d2 { animation-delay: 1.0s; }
      .node-d3 { animation-delay: 1.5s; }
      .node-d4 { animation-delay: 2.0s; }
      
      @keyframes radarSweep {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .radar-sweep-line {
        transform-origin: 680px 200px;
        animation: radarSweep 9s linear infinite;
      }
      
      @keyframes linePulse {
        0%, 100% { stroke-dashoffset: 20; stroke: #00f0ff; }
        50% { stroke-dashoffset: 0; stroke: #00ff66; }
      }
      .net-line {
        stroke-dasharray: 5, 5;
        animation: linePulse 5s linear infinite;
      }
    </style>
  </defs>
  
  <!-- Outer Terminal -->
  <rect x="5" y="5" width="840" height="390" rx="10" class="terminal-rect" fill="#03050c" stroke-width="1.5" />
  
  <!-- Header Bar -->
  <path d="M 5 15 A 10 10 0 0 1 15 5 L 835 5 A 10 10 0 0 1 845 15 L 845 40 L 5 40 Z" fill="#0d1527" />
  <circle cx="25" cy="22" r="6" class="dot-red" />
  <circle cx="45" cy="22" r="6" class="dot-yellow" />
  <circle cx="65" cy="22" r="6" class="dot-green" />
  <text x="425" y="27" text-anchor="middle" class="text-title">vishal@ai-core:~</text>

  <!-- Dense Background Matrix Digital Rain (Falling vertically behind console/radar layers) -->
  <g class="matrix-col">
    <!-- Col 1 (Far Left) -->
    <g class="m-speed-1" transform="translate(30, 0)" opacity="0.12">
      <text x="0" y="20">0</text><text x="0" y="40">1</text><text x="0" y="60">0</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 2 -->
    <g class="m-speed-2" transform="translate(80, 0)" opacity="0.22">
      <text x="0" y="20">1</text><text x="0" y="40">0</text><text x="0" y="60">1</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">1</text><text x="0" y="140">0</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 3 -->
    <g class="m-speed-3" transform="translate(130, 0)" opacity="0.08">
      <text x="0" y="20">1</text><text x="0" y="40">1</text><text x="0" y="60">0</text><text x="0" y="80">0</text><text x="0" y="100">1</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 4 -->
    <g class="m-speed-1" transform="translate(180, 0)" opacity="0.18">
      <text x="0" y="20">0</text><text x="0" y="40">1</text><text x="0" y="60">1</text><text x="0" y="80">0</text><text x="0" y="100">1</text><text x="0" y="120">1</text><text x="0" y="140">0</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 5 -->
    <g class="m-speed-4" transform="translate(230, 0)" opacity="0.15">
      <text x="0" y="20">9</text><text x="0" y="40">4</text><text x="0" y="60">2</text><text x="0" y="80">A</text><text x="0" y="100">I</text><text x="0" y="120">1</text><text x="0" y="140">0</text><text x="0" y="160">8</text><text x="0" y="180">7</text>
    </g>
    <!-- Col 6 -->
    <g class="m-speed-2" transform="translate(280, 0)" opacity="0.25">
      <text x="0" y="20">D</text><text x="0" y="40">S</text><text x="0" y="60">A</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">1</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 7 -->
    <g class="m-speed-3" transform="translate(330, 0)" opacity="0.10">
      <text x="0" y="20">1</text><text x="0" y="40">0</text><text x="0" y="60">1</text><text x="0" y="80">0</text><text x="0" y="100">1</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 8 -->
    <g class="m-speed-1" transform="translate(380, 0)" opacity="0.20">
      <text x="0" y="20">0</text><text x="0" y="40">1</text><text x="0" y="60">0</text><text x="0" y="80">1</text><text x="0" y="100">1</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 9 -->
    <g class="m-speed-4" transform="translate(430, 0)" opacity="0.13">
      <text x="0" y="20">J</text><text x="0" y="40">A</text><text x="0" y="60">V</text><text x="0" y="80">A</text><text x="0" y="100">1</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 10 -->
    <g class="m-speed-2" transform="translate(480, 0)" opacity="0.22">
      <text x="0" y="20">P</text><text x="0" y="40">Y</text><text x="0" y="60">T</text><text x="0" y="80">H</text><text x="0" y="100">O</text><text x="0" y="120">N</text><text x="0" y="140">0</text><text x="0" y="160">1</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 11 -->
    <g class="m-speed-3" transform="translate(530, 0)" opacity="0.09">
      <text x="0" y="20">C</text><text x="0" y="40">P</text><text x="0" y="60">P</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">1</text><text x="0" y="140">0</text><text x="0" y="160">1</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 12 -->
    <g class="m-speed-1" transform="translate(580, 0)" opacity="0.17">
      <text x="0" y="20">1</text><text x="0" y="40">0</text><text x="0" y="60">0</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">1</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 13 (Behind Radar area) -->
    <g class="m-speed-2" transform="translate(630, 0)" opacity="0.11">
      <text x="0" y="20">0</text><text x="0" y="40">1</text><text x="0" y="60">1</text><text x="0" y="80">0</text><text x="0" y="100">1</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 14 -->
    <g class="m-speed-3" transform="translate(680, 0)" opacity="0.07">
      <text x="0" y="20">1</text><text x="0" y="40">0</text><text x="0" y="60">1</text><text x="0" y="80">0</text><text x="0" y="100">1</text><text x="0" y="120">1</text><text x="0" y="140">0</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 15 -->
    <g class="m-speed-1" transform="translate(730, 0)" opacity="0.14">
      <text x="0" y="20">0</text><text x="0" y="40">1</text><text x="0" y="60">0</text><text x="0" y="80">1</text><text x="0" y="100">1</text><text x="0" y="120">0</text><text x="0" y="140">1</text><text x="0" y="160">1</text><text x="0" y="180">0</text>
    </g>
    <!-- Col 16 -->
    <g class="m-speed-4" transform="translate(780, 0)" opacity="0.10">
      <text x="0" y="20">1</text><text x="0" y="40">1</text><text x="0" y="60">0</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">1</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
    <!-- Col 17 -->
    <g class="m-speed-2" transform="translate(820, 0)" opacity="0.16">
      <text x="0" y="20">0</text><text x="0" y="40">0</text><text x="0" y="60">1</text><text x="0" y="80">1</text><text x="0" y="100">0</text><text x="0" y="120">1</text><text x="0" y="140">1</text><text x="0" y="160">0</text><text x="0" y="180">1</text>
    </g>
  </g>

  <!-- Left Console Area (Hacker Typing Logs) -->
  <!-- Line 1 -->
  <g class="line-1">
    <text x="25" y="80" class="terminal-text">
      <tspan class="prompt-user">vishal</tspan><tspan class="prompt-host">@ai-core</tspan><tspan class="prompt-dir">:~$</tspan>
      <tspan class="cmd"> ./decrypt_access.sh --target=profile</tspan>
    </text>
  </g>
  
  <!-- Line 2 -->
  <g class="line-2">
    <text x="25" y="120" class="terminal-text">
      <tspan class="status-alert">[!] </tspan>DECRYPTING SYSTEM PORTAL [██████████░░] 83%
    </text>
  </g>
  
  <!-- Line 3 -->
  <g class="line-3">
    <text x="25" y="160" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>ACCESS GRANTED: WELCOME VISHAL JOSHI
    </text>
  </g>

  <!-- Line 4 -->
  <g class="line-4">
    <text x="25" y="200" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>System Status: Active | Core Load: Java, Python, C++, Flutter
    </text>
  </g>

  <!-- Line 5 -->
  <g class="line-5">
    <text x="25" y="240" class="terminal-text">
      <tspan class="status-ok">[✓] </tspan>Target Domain: AI Powered Applications &amp; DSA Algorithms
    </text>
  </g>

  <!-- Line 6 -->
  <g class="line-6">
    <text x="25" y="280" class="terminal-text">
      <tspan class="prompt-user">vishal</tspan><tspan class="prompt-host">@ai-core</tspan><tspan class="prompt-dir">:~$</tspan>
      <tspan class="cmd"> boot_system --mode=ai-engineer</tspan>
    </text>
    <rect x="25" y="305" width="12" height="20" class="cursor" />
    <text x="45" y="322" class="terminal-text" fill="#00ff66" font-weight="bold">System fully initialized. Deploying modules...</text>
  </g>

  <!-- Right Side: Radar / Net Area -->
  <circle cx="680" cy="200" r="110" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
  <circle cx="680" cy="200" r="80" fill="none" stroke="#00ff66" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />
  <circle cx="680" cy="200" r="45" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.2" />
  <circle cx="680" cy="200" r="10" fill="none" stroke="#00ff66" stroke-width="1" />
  
  <!-- Radar Crosshairs -->
  <line x1="560" y1="200" x2="800" y2="200" stroke="#00f0ff" stroke-width="0.5" opacity="0.2" />
  <line x1="680" y1="80" x2="680" y2="320" stroke="#00f0ff" stroke-width="0.5" opacity="0.2" />
  
  <!-- Radar Sweep Line -->
  <line x1="680" y1="200" x2="770" y2="150" stroke="#00ff66" stroke-width="2" class="radar-sweep-line" opacity="0.7" />
  
  <!-- Net connections -->
  <g stroke="#00f0ff" stroke-width="1" class="net-line">
    <line x1="620" y1="140" x2="680" y2="110" />
    <line x1="680" y1="110" x2="740" y2="130" />
    <line x1="740" y1="130" x2="750" y2="220" />
    <line x1="750" y1="220" x2="690" y2="270" />
    <line x1="690" y1="270" x2="610" y2="230" />
    <line x1="610" y1="230" x2="620" y2="140" />
  </g>
  
  <!-- Nodes -->
  <circle cx="620" cy="140" r="5" class="node node-d1" />
  <circle cx="680" cy="110" r="5" class="node node-d2" />
  <circle cx="740" cy="130" r="5" class="node node-d3" />
  <circle cx="750" cy="220" r="5" class="node node-d4" />
  <circle cx="690" cy="270" r="5" class="node node-d1" />
  <circle cx="610" cy="230" r="5" class="node node-d2" />
  <circle cx="680" cy="200" r="7" fill="#00ff66" filter="drop-shadow(0 0 5px #00ff66)" />
</svg>
