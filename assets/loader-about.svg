<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 50" width="850" height="50">
  <defs>
    <style>
      @keyframes borderGlow {
        0%, 100% { stroke: #00f0ff; filter: drop-shadow(0 0 2px #00f0ff); }
        50% { stroke: #00ff66; filter: drop-shadow(0 0 5px #00ff66); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .box {
        fill: #050814;
        stroke-width: 1.5;
        animation: borderGlow 4s infinite ease-in-out;
      }
      .cursor {
        fill: #00ff66;
        animation: blink 1s infinite;
      }
      .text-style {
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect width="840" height="46" x="5" y="2" rx="6" class="box" />
  <text x="20" y="29" fill="#00ff66" class="text-style" font-weight="bold">
    vishal@ai-core:~$ <tspan fill="#ffffff">load_module --identity</tspan>
  </text>
  <text x="380" y="29" fill="#a9b1d6" class="text-style">
    [<tspan fill="#00ff66">████████████████████</tspan>] 100% SECURE_DECRYPT
  </text>
  <circle cx="820" cy="25" r="6" fill="#00ff66" class="cursor" />
</svg>
