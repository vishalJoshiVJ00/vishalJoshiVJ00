<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 50" width="850" height="50">
  <defs>
    <style>
      @keyframes borderGlow {
        0%, 100% { stroke: #00ff66; filter: drop-shadow(0 0 2px #00ff66); }
        50% { stroke: #00f0ff; filter: drop-shadow(0 0 5px #00f0ff); }
      }
      @keyframes dataPing {
        0% { cx: 600; opacity: 1; filter: drop-shadow(0 0 2px #00f0ff); }
        100% { cx: 800; opacity: 0; filter: drop-shadow(0 0 5px #00f0ff); }
      }
      .box {
        fill: #050814;
        stroke-width: 1.5;
        animation: borderGlow 4s infinite ease-in-out;
      }
      .ping {
        animation: dataPing 2s infinite linear;
      }
      .text-style {
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect width="840" height="46" x="5" y="2" rx="6" class="box" />
  <text x="20" y="29" fill="#00ff66" class="text-style" font-weight="bold">
    vishal@ai-core:~$ <tspan fill="#ffffff">query_db --all-skills</tspan>
  </text>
  <text x="320" y="29" fill="#a9b1d6" class="text-style">
    DATA_STREAM: <tspan fill="#00ff66">FETCH_SUCCESS (200 OK)</tspan>
  </text>
  <line x1="600" y1="25" x2="800" y2="25" stroke="#121c33" stroke-width="2" stroke-linecap="round" />
  <circle cx="600" cy="25" r="5" fill="#00f0ff" class="ping" />
</svg>
