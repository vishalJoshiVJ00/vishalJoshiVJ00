<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 50" width="850" height="50">
  <defs>
    <style>
      @keyframes borderGlow {
        0%, 100% { stroke: #00f0ff; filter: drop-shadow(0 0 2px #00f0ff); }
        50% { stroke: #00ff66; filter: drop-shadow(0 0 5px #00ff66); }
      }
      @keyframes scannerScan {
        0% { x: 520; }
        50% { x: 790; }
        100% { x: 520; }
      }
      .box {
        fill: #050814;
        stroke-width: 1.5;
        animation: borderGlow 4s infinite ease-in-out;
      }
      .scanner {
        fill: #00ff66;
        filter: drop-shadow(0 0 3px #00ff66);
        animation: scannerScan 4s infinite ease-in-out;
      }
      .text-style {
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect width="840" height="46" x="5" y="2" rx="6" class="box" />
  <text x="20" y="29" fill="#00ff66" class="text-style" font-weight="bold">
    vishal@ai-core:~$ <tspan fill="#ffffff">list_projects --featured</tspan>
  </text>
  <text x="320" y="29" fill="#a9b1d6" class="text-style">
    SCANNING REPOS...
  </text>
  <rect x="520" y="16" width="280" height="14" fill="#121c33" rx="3" />
  <rect x="520" y="16" width="12" height="14" rx="3" class="scanner" />
</svg>
