<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 40" width="850" height="40">
  <defs>
    <style>
      @keyframes borderGlow {
        0%, 100% { stroke: #00f0ff; }
        50% { stroke: #00ff66; }
      }
      @keyframes scannerScan {
        0% { x: 520; }
        50% { x: 790; }
        100% { x: 520; }
      }
      .box {
        fill: #050814;
        stroke-width: 1;
        animation: borderGlow 4s infinite ease-in-out;
      }
      .scanner {
        fill: #00ff66;
        animation: scannerScan 4s infinite ease-in-out;
      }
      .text-style {
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </defs>
  <rect width="840" height="38" x="5" y="1" rx="5" class="box" />
  <text x="20" y="24" fill="#00ff66" class="text-style" font-weight="bold">
    vishal@ai-core:~$ <tspan fill="#ffffff">list_projects --featured</tspan>
  </text>
  <text x="320" y="24" fill="#a9b1d6" class="text-style">
    SCANNING REPOS...
  </text>
  <rect x="520" y="14" width="280" height="10" fill="#121c33" rx="2" />
  <rect x="520" y="14" width="10" height="10" rx="2" class="scanner" />
</svg>
