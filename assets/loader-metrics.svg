<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 50" width="850" height="50">
  <defs>
    <style>
      @keyframes borderGlow {
        0%, 100% { stroke: #00ff66; filter: drop-shadow(0 0 2px #00ff66); }
        50% { stroke: #00f0ff; filter: drop-shadow(0 0 5px #00f0ff); }
      }
      @keyframes radarSweep {
        0%, 100% { opacity: 0.2; fill: #00f0ff; filter: drop-shadow(0 0 2px #00f0ff); }
        50% { opacity: 1; fill: #00ff66; filter: drop-shadow(0 0 5px #00ff66); }
      }
      .box {
        fill: #050814;
        stroke-width: 1.5;
        animation: borderGlow 4s infinite ease-in-out;
      }
      .sweep {
        animation: radarSweep 1.5s infinite ease-in-out;
      }
      .text-style {
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </defs>
  <rect width="840" height="46" x="5" y="2" rx="6" class="box" />
  <text x="20" y="29" fill="#00ff66" class="text-style" font-weight="bold">
    vishal@ai-core:~$ <tspan fill="#ffffff">fetch --metrics --user=vishalJoshiVJ00</tspan>
  </text>
  <text x="420" y="29" fill="#a9b1d6" class="text-style">
    SECURE_SOCKET_ESTABLISHED
  </text>
  <circle cx="820" cy="25" r="6" class="sweep" />
</svg>
